<!doctype html><html><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kaci Strong 3.3</title>
<link rel="stylesheet" href="style.css">
</head><body>
<header><h1>💙 Kaci Strong</h1>
<p id="greeting"></p>
<div class="pill" id="status"></div>
<p><b id="nextOff">Next OFF day: July 17</b></p>
</header>
<main>
<section class="card">
<h2>Today's Workout</h2>
<h3 id="workoutName">Upper Body & Arms</h3>
<progress id="prog" value="0" max="5"></progress>
<label><input class="ex" type="checkbox"> Warm-up</label>
<label><input class="ex" type="checkbox"> Push-ups</label>
<label><input class="ex" type="checkbox"> Dumbbell Press</label>
<label><input class="ex" type="checkbox"> Rows</label>
<label><input class="ex" type="checkbox"> Stretch</label>
<button onclick="resetWorkout()">Reset Workout</button>
</section>
<section class="card"><h2>🔥 Workout Streak</h2><div id="streak">0 days</div></section>
<section class="card"><h2>💧 Water</h2><button onclick="adj('water',-1)">-</button> <span id="water"></span>/8 <button onclick="adj('water',1)">+</button></section>
<section class="card"><h2>🍗 Protein</h2><button onclick="adj('protein',-10)">-</button> <span id="protein"></span>/120g <button onclick="adj('protein',10)">+</button></section>
</main>
<script src="app.js"></script></body></html>
