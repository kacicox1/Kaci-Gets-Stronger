<!doctype html><html><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kaci Strong 3.1.1</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head><body>
<header class="hero">
<h1>💙 Kaci Strong</h1>
<p id="greeting"></p>
<div class="pill">🟢 OFF DAY</div>
<p class="small"><strong>Next OFF day: July 17</strong></p>
</header>

<section class="card">
<h2>Today's Workout</h2>
<h3>Upper Body & Arms</h3>
<p>⏱️ 25 Minutes</p>
<progress id="workProgress" value="0" max="5"></progress>
<ul class="checklist">
<li><label><input type="checkbox" class="ex"> Warm-up</label></li>
<li><label><input type="checkbox" class="ex"> Push-ups</label></li>
<li><label><input type="checkbox" class="ex"> Dumbbell Press</label></li>
<li><label><input type="checkbox" class="ex"> Rows</label></li>
<li><label><input type="checkbox" class="ex"> Stretch</label></li>
</ul>
<button>▶ Start Workout</button>
</section>

<section class="grid">
<div class="card"><h2>💧 Water</h2><button onclick="chg('water',-1)">−</button> <span id="water"></span>/8 <button onclick="chg('water',1)">+</button></div>
<div class="card"><h2>🍗 Protein</h2><button onclick="chg('protein',-10)">−</button> <span id="protein"></span>/120 g <button onclick="chg('protein',10)">+</button></div>
<div class="card"><h2>👣 Steps</h2><button onclick="chg('steps',-500)">−</button> <span id="steps"></span>/7000 <button onclick="chg('steps',500)">+</button></div>
<div class="card"><h2>⚖️ Weight</h2><input id="weight" placeholder="lbs"></div>
</section>

<nav class="nav"><div>🏠<br>Home</div><div>💪<br>Workout</div><div>📈<br>Progress</div><div>⚙️<br>Settings</div></nav>
<script src="app.js"></script></body></html>
