<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kaci Strong 3.2</title><link rel="stylesheet" href="style.css"></head>
<body>
<header><h1>💙 Kaci Strong</h1><p>Good Afternoon, Kaci!</p>
<div class="badge">🟢 OFF DAY</div><p><b>Next OFF day: July 17</b></p></header>
<main>
<section class="card"><h2>Today's Workout</h2>
<h3>Upper Body & Arms</h3>
<progress value="0" max="5"></progress>
<ul>
<li><input type="checkbox"> Warm-up</li>
<li><input type="checkbox"> Push-ups</li>
<li><input type="checkbox"> Dumbbell Press</li>
<li><input type="checkbox"> Rows</li>
<li><input type="checkbox"> Stretch</li>
</ul>
<button onclick="startWorkout()">▶ Start Workout</button>
</section>
<section class="card"><h2>💧 Water</h2><button onclick="change('water',-1)">-</button> <span id="water">0</span>/8 <button onclick="change('water',1)">+</button></section>
<section class="card"><h2>🍗 Protein</h2><button onclick="change('protein',-10)">-</button> <span id="protein">0</span>/120 g <button onclick="change('protein',10)">+</button></section>
</main>
<script src="app.js"></script></body></html>
