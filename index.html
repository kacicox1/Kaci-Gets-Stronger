<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kaci Strong v6.0</title>

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#6ea8dc">

</head>

<body>

<header class="hero">

<div class="hero-content">

<h1>💙 Kaci Strong</h1>

<p id="greeting">Welcome Back, Kaci!</p>

<div class="status-pill">

🟢 OFF DAY

</div>

<p class="next-off">

Next OFF Day • July 17

</p>

</div>

</header>

<main>

<section class="card workout-card">

<h2>Today's Workout</h2>

<h3 id="todayWorkout">

Upper Body & Arms

</h3>

<div class="progress-bar">

<div id="progressFill"></div>

</div>

<ul class="exercise-list">

<li><label><input type="checkbox"> Warm-up</label></li>

<li><label><input type="checkbox"> Push-ups</label></li>

<li><label><input type="checkbox"> Dumbbell Press</label></li>

<li><label><input type="checkbox"> Rows</label></li>

<li><label><input type="checkbox"> Stretch</label></li>

</ul>

<button id="startWorkout">

▶ Start Workout

</button>

</section>

<section class="dashboard">

<div class="mini-card">

<h3>💧 Water</h3>

<div class="counter">

<button id="waterMinus">−</button>

<span id="waterCount">0 / 8</span>

<button id="waterPlus">+</button>

</div>

</div>

<div class="mini-card">

<h3>🍗 Protein</h3>

<div class="counter">

<button id="proteinMinus">−</button>

<span id="proteinCount">0 / 120g</span>

<button id="proteinPlus">+</button>

</div>

</div>

<div class="mini-card">

<h3>🔥 Workout Streak</h3>

<p id="streak">0 Days</p>

</div>

<div class="mini-card">

<h3>⚖️ Weight Goal</h3>

<p id="goalRemaining">

55 lbs Remaining

</p>

</div>

</section>

</main>

<nav class="bottom-nav">

<button class="active">

🏠

<span>Home</span>

</button>

<button>

💪

<span>Workout</span>

</button>

<button>

📈

<span>Progress</span>

</button>

<button>

⚙️

<span>Settings</span>

</button>

</nav>

<script src="app.js"></script>

</body>

</html>
