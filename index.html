<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kaci Strong 4.0 Preview</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="hero">
<h1>💙 Kaci Strong</h1>
<p id="greet"></p>
<div class="badge">🟢 OFF DAY</div>
<p class="next">Next OFF Day: <b>July 17</b></p>
</header>

<div class="card">
<h2>Today's Workout</h2>
<h3>Upper Body & Arms</h3>
<progress id="prog" value="0" max="5"></progress>
<label><input class="ex" type="checkbox"> Warm-up</label>
<label><input class="ex" type="checkbox"> Push-ups</label>
<label><input class="ex" type="checkbox"> Dumbbell Press</label>
<label><input class="ex" type="checkbox"> Rows</label>
<label><input class="ex" type="checkbox"> Stretch</label>
<button onclick="finishWorkout()">Finish Workout</button>
</div>

<div class="grid">
<div class="card"><h3>💧 Water</h3><button onclick="adj('w',-1)">-</button> <span id="w"></span>/8 <button onclick="adj('w',1)">+</button></div>
<div class="card"><h3>🍗 Protein</h3><button onclick="adj('p',-10)">-</button> <span id="p"></span>/120g <button onclick="adj('p',10)">+</button></div>
<div class="card"><h3>🔥 Streak</h3><div id="s">0 days</div></div>
<div class="card"><h3>⚖️ Weight Goal</h3><div>55 lbs to goal</div></div>
</div>
<script src="app.js"></script>
</body></html>
