<!DOCTYPE html><html lang='en'><head>
<meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Kaci Strong 2.1</title>
<link rel='manifest' href='manifest.json'>
<link rel='stylesheet' href='style.css'>
</head><body>
<header class='hero'>
<h1>💙 Kaci Strong</h1>
<p id='greeting'>Welcome!</p>
<div class='status-card'>
<div class='status'>🟢 <strong>OFF DAY</strong></div>
<h2>Today's Workout</h2>
<h3 id='todayWorkout'>Upper Body & Arms</h3>
<p>⏱️ 25 Minutes</p>
<button id='startWorkout'>▶ Start Workout</button>
</div></header>
<main>
<div class='card'><h2>🔥 Workout Streak</h2><p id='streak'>0 Days</p></div>
<div class='card'><h2>💧 Water</h2><input id='water' type='range' min='0' max='8' value='0'><p><span id='waterValue'>0</span>/8 glasses</p></div>
<div class='card'><h2>🍗 Protein</h2><input id='protein' type='range' min='0' max='120' value='0'><p><span id='proteinValue'>0</span>/120 g</p></div>
<div class='card'><h2>❤️ Quote</h2><p id='quote'></p></div>
</main>
<nav class='bottom'>
<button>🏠<br>Home</button><button>💪<br>Workout</button><button>📈<br>Progress</button><button>⚙️<br>Settings</button>
</nav>
<script src='app.js'></script></body></html>
