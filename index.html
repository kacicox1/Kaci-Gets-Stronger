<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kaci Strong 4.0.0</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="hero">
<h1>💙 Kaci Strong</h1>
<p id="greeting"></p>
<div class="badge" id="status">🟢 OFF DAY</div>
<p id="nextoff">Next OFF Day: July 17</p>
</header>

<section class="card">
<h2>Today's Workout</h2>
<h3>Upper Body & Arms</h3>
<progress id="progress" value="0" max="5"></progress>
<div class="checks">
<label><input class="ex" type="checkbox"> Warm-up</label>
<label><input class="ex" type="checkbox"> Push-ups</label>
<label><input class="ex" type="checkbox"> Dumbbell Press</label>
<label><input class="ex" type="checkbox"> Rows</label>
<label><input class="ex" type="checkbox"> Stretch</label>
</div>
<button id="finish">Finish Workout</button>
</section>

<div class="grid">
<div class="card"><h3>💧 Water</h3><button onclick="adjust('water',-1)">−</button><span id="water"></span>/8<button onclick="adjust('water',1)">+</button></div>
<div class="card"><h3>🍗 Protein</h3><button onclick="adjust('protein',-10)">−</button><span id="protein"></span>/120g<button onclick="adjust('protein',10)">+</button></div>
<div class="card"><h3>🔥 Streak</h3><div id="streak"></div></div>
<div class="card"><h3>⚖️ Weight Goal</h3><div>55 lbs remaining</div></div>
</div>

<nav><span>🏠 Home</span><span>💪 Workout</span><span>📈 Progress</span><span>⚙️ Settings</span></nav>
<script src="app.js"></script>
</body></html>
